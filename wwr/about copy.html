<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Water Rafting - Contact Us</title>
  <meta name="description" content="Get in touch with White Water Rafting. Contact info, employee profiles, and message form.">
  <link rel="stylesheet" href="styles/rafting.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400;0,900;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <div class="logo-box">
      <img src="images/logo.png" alt="Company logo">
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- Contact Info Section -->
    <section class="contact-section">
      <div class="contact-content">
        <h1>Contact Us</h1>
        <ul>
          <li><strong>Address:</strong> Negros Occidental, Visayas, Philippines</li>
          <li><strong>Phone:</strong> +63 912 345 6789</li>
          <li><strong>Email:</strong> info@raftingadventure.com</li>
        </ul>
        <iframe
          src="https://www.google.com/maps/embed?pb=..." 
          width="400" 
          height="300" 
          style="border:0;" 
          allowfullscreen="" 
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </section>

    <!-- Employee Images -->
    <section class="employees">
      <h2>Meet Our Team</h2>
      <figure>
        <img src="images/rafting1.jpg" alt="Employee 1">
        <figcaption>Jane – Tour Leader</figcaption>
      </figure>
      <figure>
        <img src="images/rafting2.jpg" alt="Employee 2">
        <figcaption>Mike – Safety Expert</figcaption>
      </figure>
      <figure>
        <img src="images/rafting3.jpg" alt="Employee 3">
        <figcaption>Ana – Raft Guide</figcaption>
      </figure>
    </section>

    <!-- Contact Form -->
    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>

        <p>What is the purpose of your message?</p>
        <label><input type="radio" name="purpose" value="general" required> General Inquiry</label><br>
        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label><br>
        <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>

        <label for="message">Your Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label>
          <input type="checkbox" name="subscribe">
          Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Submit</button>
      </form>
    </section>

  </main>

  <footer>
    <p>&copy; 2025 White Water Rafting | All Rights Reserved</p>
  </footer>

</body>
</html>
